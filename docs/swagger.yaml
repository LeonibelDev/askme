basePath: /api
definitions:
  github_com_leonibeldev_askme_pkg_utils_models.BlogPost:
    properties:
      Type:
        type: string
      content:
        type: string
      position:
        type: integer
    required:
    - Type
    - content
    - position
    type: object
  github_com_leonibeldev_askme_pkg_utils_models.DBUser:
    properties:
      created_at:
        type: string
      email:
        type: string
      external_link:
        type: string
      fullname:
        type: string
      github:
        type: string
      id:
        type: integer
      instagram:
        type: string
      is_verified:
        type: boolean
      password:
        minLength: 6
        type: string
      resume:
        type: string
      role:
        type: string
      twitter:
        type: string
      username:
        type: string
    required:
    - email
    - fullname
    - password
    type: object
  github_com_leonibeldev_askme_pkg_utils_models.Login:
    properties:
      email:
        type: string
      fullname:
        type: string
      password:
        type: string
      username:
        type: string
    required:
    - email
    - password
    type: object
  github_com_leonibeldev_askme_pkg_utils_models.Newsletter:
    properties:
      Inserted_at:
        type: string
      email:
        type: string
      id:
        type: string
    type: object
  github_com_leonibeldev_askme_pkg_utils_models.Post:
    properties:
      author:
        type: string
      cover:
        type: string
      date:
        type: string
      fullname:
        type: string
      id:
        type: string
      sections:
        items:
          $ref: '#/definitions/github_com_leonibeldev_askme_pkg_utils_models.BlogPost'
        type: array
      tags:
        items:
          type: string
        type: array
      title:
        type: string
      views:
        type: integer
      visible:
        type: boolean
    required:
    - cover
    - tags
    - title
    type: object
  github_com_leonibeldev_askme_pkg_utils_models.ResponseMessage:
    properties:
      data: {}
      error:
        type: string
      message:
        type: string
      success:
        type: boolean
    type: object
host: localhost:3000
info:
  contact:
    email: leonibel.ramirez@gmail.com
    name: LeonibelDev
  description: API for mytechblog platform.
  termsOfService: work in progress
  title: mytechblog API
  version: "1.0"
paths:
  /admin/home:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Admin home
      tags:
      - Admin
  /admin/user:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_leonibeldev_askme_pkg_utils_models.ResponseMessage'
      security:
      - ApiKeyAuth: []
      summary: Get admin user
      tags:
      - Admin
  /auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Login credentials
        in: body
        name: login
        required: true
        schema:
          $ref: '#/definitions/github_com_leonibeldev_askme_pkg_utils_models.Login'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Login user
      tags:
      - Auth
  /auth/signup:
    post:
      consumes:
      - application/json
      parameters:
      - description: User registration info
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/github_com_leonibeldev_askme_pkg_utils_models.DBUser'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_leonibeldev_askme_pkg_utils_models.ResponseMessage'
            - properties:
                data:
                  type: string
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_leonibeldev_askme_pkg_utils_models.ResponseMessage'
      summary: Register new user
      tags:
      - Auth
  /newsletter:
    post:
      consumes:
      - application/json
      parameters:
      - description: Newsletter User
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/github_com_leonibeldev_askme_pkg_utils_models.Newsletter'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Subscribe to newsletter
      tags:
      - Newsletter
  /newsletter/{uuid}:
    get:
      parameters:
      - description: User UUID
        in: path
        name: uuid
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Unsubscribe from newsletter
      tags:
      - Newsletter
  /posts:
    get:
      description: Retrieve paginated list of blog posts
      parameters:
      - description: Pagination offset
        in: query
        name: offset
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_leonibeldev_askme_pkg_utils_models.ResponseMessage'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/github_com_leonibeldev_askme_pkg_utils_models.Post'
                  type: array
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_leonibeldev_askme_pkg_utils_models.ResponseMessage'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_leonibeldev_askme_pkg_utils_models.ResponseMessage'
      summary: Get all blog posts
      tags:
      - Blog
  /posts/{id}:
    get:
      description: Retrieve a single blog post using its unique identifier
      parameters:
      - description: Post ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_leonibeldev_askme_pkg_utils_models.ResponseMessage'
            - properties:
                data:
                  $ref: '#/definitions/github_com_leonibeldev_askme_pkg_utils_models.Post'
              type: object
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_leonibeldev_askme_pkg_utils_models.ResponseMessage'
      summary: Get a blog post by ID
      tags:
      - Blog
  /posts/new:
    post:
      consumes:
      - application/json
      description: Create a blog post (authentication required)
      parameters:
      - description: Blog post payload
        in: body
        name: post
        required: true
        schema:
          $ref: '#/definitions/github_com_leonibeldev_askme_pkg_utils_models.Post'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_leonibeldev_askme_pkg_utils_models.ResponseMessage'
            - properties:
                data:
                  type: string
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_leonibeldev_askme_pkg_utils_models.ResponseMessage'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_leonibeldev_askme_pkg_utils_models.ResponseMessage'
      security:
      - BearerAuth: []
      summary: Create a new blog post
      tags:
      - Blog
  /posts/tag:
    get:
      description: Retrieve blog posts filtered by tag
      parameters:
      - description: Tag name
        in: query
        name: tag
        required: true
        type: string
      - description: Pagination offset
        in: query
        name: offset
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_leonibeldev_askme_pkg_utils_models.ResponseMessage'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/github_com_leonibeldev_askme_pkg_utils_models.Post'
                  type: array
              type: object
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_leonibeldev_askme_pkg_utils_models.ResponseMessage'
      summary: Get posts by tag
      tags:
      - Blog
  /posts/top:
    get:
      description: Retrieve top blog posts ordered by views
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_leonibeldev_askme_pkg_utils_models.ResponseMessage'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/github_com_leonibeldev_askme_pkg_utils_models.Post'
                  type: array
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_leonibeldev_askme_pkg_utils_models.ResponseMessage'
      summary: Get top blog posts
      tags:
      - Blog
swagger: "2.0"
